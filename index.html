<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokeVault | Deluxe Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=2">
</head>
<body>
    <header>
        <h1 id="logo" onclick="resetarPagina()">PokeVault</h1>
        <p class="tagline" id="tagline-text">Gerenciando sua jornada de colecionador.</p>
        <div class="search-container">
            <div class="search-box">
                <input type="text" id="cardName" placeholder="Buscar nova carta (Ex: Charizard ou 40/189)...">
                <button id="searchBtn" onclick="buscarCarta()">Pesquisar</button>
            </div>
        </div>
    </header>

    <main class="main-content">
        <section class="dashboard-container container">
            <div class="featured-card-box">
                <h3>Pokémon em Destaque</h3>
                <div id="featured-display"><p>Adicione cartas para ver um destaque!</p></div>
            </div>
            <div class="stats-panel">
                <div class="stat-card">
                    <span class="stat-icon">🔴</span>
                    <div class="stat-info"><h4 id="stat-total">0</h4><p>Total Capturado</p></div>
                </div>
                <div class="stat-card">
                    <span class="stat-icon">🗺️</span>
                    <div class="stat-info"><h4 id="stat-sets">0</h4><p>Expansões Únicas</p></div>
                </div>
                <div class="stat-card">
                    <span class="stat-icon">🕒</span>
                    <div class="stat-info"><h4 id="stat-last" style="font-size: 0.9rem;">---</h4><p>Última Adição</p></div>
                </div>
            </div>
        </section>

        <section id="search-section" class="container">
            <h2 id="search-title" style="display: none;">Resultados da Busca</h2>
            <div id="results-grid" class="card-grid"></div>
        </section>

        <div class="divider"></div>

        <section id="my-collection" class="container">
            <div class="collection-header">
                <h2>Minha Coleção</h2>
                <div class="backup-mini-controls">
                    <button class="btn-small" onclick="exportarColecao()" title="Exportar Backup">📥</button>
                    <label for="importFile" class="btn-small" title="Importar Backup">📤</label>
                    <input type="file" id="importFile" accept=".json" onchange="importarColecao(event)" style="display: none;">
                </div>
            </div>
            <div class="controls-row">
                <div class="control-group">
                    <label>Filtrar por Expansão:</label>
                    <select id="setFilter" onchange="renderizarColecao()"><option value="all">Todas as Coleções</option></select>
                </div>
                <div class="control-group">
                    <label>Ordenar por:</label>
                    <select id="sortOrder" onchange="renderizarColecao()">
                        <option value="newest">Mais Recentes</option>
                        <option value="name">Nome (A-Z)</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>Busca Rápida:</label>
                    <input type="text" id="filterInput" placeholder="Filtrar coleção..." oninput="renderizarColecao()">
                </div>
            </div>
            <div id="collection-grid" class="card-grid"></div>
        </section>
    </main>

    <div id="toast">Notificação</div>
    <footer><p>PokeVault &copy; 2026 - Desenvolvido por Maiara</p></footer>
    <script src="script.js"></script>
</body>
</html>
